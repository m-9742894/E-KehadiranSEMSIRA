<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMSIRA - Host Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 核心样式 */
        :root { --bg-color: #0f172a; --panel-bg: #1e293b; --primary: #0ea5e9; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --text-main: #f8fafc; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }
        .hidden { display: none !important; }
        nav { background-color: var(--panel-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); flex-wrap: wrap; gap: 10px;}
        .nav-brand { font-size: 1.2rem; font-weight: bold; color: var(--primary); letter-spacing: 1px; }
        .nav-links button { background: none; border: none; color: var(--text-main); margin-left: 15px; cursor: pointer; font-size: 1rem; padding: 5px; }
        .nav-links button:hover { color: var(--primary); }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .card { background: var(--panel-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .sub-card { background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 15px; }
        button.btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button.btn:hover { background: #0284c7; }
        button.btn-danger { background: var(--danger); }
        button.btn-success { background: var(--success); }
        button.btn-warning { background: var(--warning); color: #000; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: var(--primary); }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index: 1000; }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="nav-brand"><i class="fas fa-server"></i> SEMSIRA HOST PANEL</div>
        <div class="nav-links" id="nav-menus">
            </div>
    </nav>

    <div id="page-dashboard-host" class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: var(--danger);"><i class="fas fa-chart-line"></i> Dashboard Pentadbir</h2>
        </div>
        
        <div id="menu-host-statistik" class="menu-section host-menu">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>Statistik Keseluruhan</h3>
                    <div>
                        <input type="date" id="host-overall-date" style="width: 200px;" onchange="renderHostStatistik()">
                    </div>
                </div>
                <div style="height: 300px; margin: 20px 0;"><canvas id="hostOverallChart"></canvas></div>
                <div class="grid-3">
                    <div class="sub-card"><h4 style="color: var(--success);">Hadir</h4><ul id="host-list-hadir"></ul></div>
                    <div class="sub-card"><h4 style="color: var(--warning);">Lewat</h4><ul id="host-list-lewat"></ul></div>
                    <div class="sub-card"><h4 style="color: var(--danger);">Tidak Hadir</h4><ul id="host-list-takhadir"></ul></div>
                </div>
            </div>
        </div>

        <div id="menu-host-kelas-stats" class="menu-section host-menu hidden">
            <div class="card">
                <h3>Statistik Kehadiran Kelas</h3>
                <input type="date" id="host-kelas-date" onchange="renderHostKelasStats()">
                <div id="host-kelas-grid" class="grid-3"></div>
            </div>
        </div>

        <div id="menu-host-guru" class="menu-section host-menu hidden">
            <div class="card">
                <h3>Pengurusan Data Guru</h3>
                <div class="sub-card" style="border: 1px dashed var(--primary);">
                    <h4>Tambah Guru Baru</h4>
                    <div class="grid-2">
                        <input type="text" id="add-g-name" placeholder="Nama Guru">
                        <input type="email" id="add-g-email" placeholder="E-mel">
                    </div>
                    <button class="btn btn-success" onclick="tambahGuruHost()">Simpan Guru</button>
                </div>
                <table id="host-table-guru">
                    <thead><tr><th>Nama</th><th>Email</th><th>Tindakan</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal-override" class="modal-overlay hidden">
        <div class="card" style="width: 400px; border: 2px solid var(--warning);">
            <h3 style="color: var(--warning);">Ubah Kehadiran</h3>
            <p id="ovr-nama"></p>
            <input type="date" id="ovr-date">
            <select id="ovr-status">
                <option value="Hadir">Hadir</option>
                <option value="Lewat">Lewat</option>
                <option value="Tak Hadir">Tidak Hadir</option>
            </select>
            <button class="btn btn-warning" onclick="simpanOverride()">Simpan</button>
            <button class="btn" onclick="document.getElementById('modal-overlay').classList.add('hidden')">Batal</button>
        </div>
    </div>

    <script>
        /* 核心数据 */
        let db = {
            host: { email: 'hostsemsira@gmail.com', pass: 'Semsira1969' },
            gurus: [{ id: 1, name: 'Ahmad Albab', phone: '0123456789', email: 'ahmad@semsira.edu.my', pass: '123' }],
            kelas: [{ id: 1, name: '5 Sains 1', guruId: 1 }],
            murid: [{ id: 1, nama: 'Ali bin Abu', ic: '080101015563', uid: 'A1B2C3D4', kelasId: 1, kehadiran: [] }],
            tetapanWaktu: { buka: '06:30', lewat: '07:30', tutup: '14:00' }
        };

        let charts = { hostOverall: null };

        /* 页面逻辑 */
        function switchMenu(menuId) {
            document.querySelectorAll('.host-menu').forEach(el => el.classList.add('hidden'));
            document.getElementById(`menu-host-${menuId}`).classList.remove('hidden');
            if(menuId === 'statistik') renderHostStatistik();
            if(menuId === 'guru') renderHostGuru();
        }

        function setupHostNav() {
            document.getElementById('nav-menus').innerHTML = `
                <button onclick="switchMenu('statistik')">Statistik</button>
                <button onclick="switchMenu('kelas-stats')">Kelas</button>
                <button onclick="switchMenu('guru')">Urus Guru</button>
            `;
        }

        function renderHostStatistik() {
            const date = document.getElementById('host-overall-date').value || new Date().toISOString().split('T')[0];
            // 这里通常会有 Chart.js 的渲染逻辑
            console.log("Rendering stats for:", date);
        }

        function renderHostGuru() {
            const tbody = document.querySelector('#host-table-guru tbody');
            tbody.innerHTML = db.gurus.map(g => `
                <tr><td>${g.name}</td><td>${g.email}</td><td><button class="btn btn-danger">Hapus</button></td></tr>
            `).join('');
        }

        /* 自动初始化 */
        window.onload = function() {
            setupHostNav();
            document.getElementById('host-overall-date').value = new Date().toISOString().split('T')[0];
            switchMenu('statistik');
        };
    </script>
</body>
</html>
