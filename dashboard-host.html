<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEM KEHADIRAN MURID SEMSIRA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #0f172a; --panel-bg: #1e293b; --primary: #0ea5e9; 
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; 
            --text-main: #f8fafc; --text-muted: #94a3b8; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; }
        .hidden { display: none !important; }
        
        /* Layout */
        nav { background: var(--panel-bg); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .nav-links button { background: transparent; border: none; color: var(--text-main); margin-left: 15px; cursor: pointer; font-weight: 500; }
        .nav-links button:hover { color: var(--primary); }
        
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .card { background: var(--panel-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .sub-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 10px; }

        /* Form Elements */
        input, select, .btn { padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; margin: 5px 0; }
        .btn { cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--warning); color: #000; }
        .btn:hover { opacity: 0.8; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: rgba(14, 165, 233, 0.1); color: var(--primary); }
        
        /* Grid */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        
        .clickable-text { color: var(--primary); cursor: pointer; text-decoration: underline; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:1000; }
        
        @media print { .no-print { display: none !important; } .container { width: 100%; max-width: none; } }
    </style>
</head>
<body>

    <nav id="navbar" class="hidden">
        <div style="font-weight: bold; color: var(--primary); font-size: 1.2rem;">SEMSIRA DASHBOARD</div>
        <div id="nav-menus" class="nav-links"></div>
    </nav>

    <div id="page-landing" class="container">
        <div class="card" style="text-align:center; max-width: 500px; margin: 100px auto;">
            <h1 style="color:var(--primary); margin-bottom: 20px;">Sistem Kehadiran Semsira</h1>
            <div class="grid-2">
                <button class="btn btn-primary" onclick="showPage('page-login-guru')">Log Masuk Guru</button>
                <button class="btn btn-warning" onclick="showPage('page-login-host')">Log Masuk Admin</button>
            </div>
        </div>
    </div>

    <div id="page-login-host" class="container hidden">
        <div class="card" style="max-width:400px; margin: 50px auto;">
            <h3>Admin Login</h3>
            <input type="email" id="login-host-email" placeholder="Email Admin" style="width:100%">
            <input type="password" id="login-host-pass" placeholder="Password" style="width:100%">
            <button class="btn btn-primary" style="width:100%" onclick="login('host')">Login</button>
            <button class="btn" onclick="showPage('page-landing')">Kembali</button>
        </div>
    </div>

    <div id="page-dashboard-host" class="container hidden">
        <div id="menu-host-statistik" class="host-menu">
            <div class="card">
                <h3>Ringkasan Keseluruhan (Harian)</h3>
                <input type="date" id="host-overall-date" onchange="renderHostStatistik()">
                <div class="grid-3" style="margin-top:20px;">
                    <div class="sub-card" style="border-left:5px solid var(--success)"><h4>Hadir</h4><p id="stat-h">0</p></div>
                    <div class="sub-card" style="border-left:5px solid var(--warning)"><h4>Lewat</h4><p id="stat-l">0</p></div>
                    <div class="sub-card" style="border-left:5px solid var(--danger)"><h4>Tak Hadir</h4><p id="stat-th">0</p></div>
                </div>
                <div style="height:300px; margin-top:20px;"><canvas id="hostOverallChart"></canvas></div>
            </div>
        </div>

        <div id="menu-host-sejarah" class="menu-section host-menu hidden">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3><i class="fas fa-history"></i> Sejarah Keseluruhan Murid</h3>
                    <button class="btn no-print" onclick="window.print()"><i class="fas fa-print"></i> Cetak</button>
                </div>
                <div class="grid-3 no-print" style="margin-top: 15px; background: #0f172a; padding: 15px; border-radius: 8px;">
                    <div><label>Pilih Tahun:</label><select id="host-sej-tahun" onchange="paparSejarah('host')"></select></div>
                    <div><label>Pilih Kelas:</label><select id="host-sej-kelas" onchange="paparSejarah('host')"></select></div>
                    <div><label>Tarikh Spesifik:</label><input type="date" id="host-sej-tarikh" onchange="paparSejarah('host')"></div>
                </div>
                <table id="host-sej-table">
                    <thead><tr><th>Nama</th><th>No KP</th><th style="color:var(--success);">Hadir</th><th style="color:var(--warning);">Lewat</th><th style="color:var(--danger);">Tak Hadir</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="page-host-student-detail" class="container hidden">
        <div class="no-print" style="display:flex; justify-content:space-between; margin-bottom: 20px;">
            <button class="btn" id="btn-kembali-murid"><i class="fas fa-arrow-left"></i> Kembali</button>
            <button class="btn btn-warning" id="btn-edit-kehadiran-detail"><i class="fas fa-edit"></i> Edit</button>
        </div>
        <div class="card">
            <h2 id="indv-nama" style="color: var(--primary);"></h2>
            <p>No KP: <span id="indv-ic"></span> | Kelas: <span id="indv-kelas"></span></p>
            <div style="height: 250px; margin: 20px 0;"><canvas id="hostStudentChart"></canvas></div>
            <table id="indv-table"><thead><tr><th>Tarikh</th><th>Status</th><th>Masa</th></tr></thead><tbody></tbody></table>
        </div>
    </div>

    <div id="modal-override" class="modal-overlay hidden">
        <div class="card" style="width: 90%; max-width: 400px; border: 2px solid var(--warning);">
            <h3 style="color: var(--warning);">Ubah Kehadiran</h3>
            <p id="ovr-nama" style="font-weight:bold;"></p>
            <input type="hidden" id="ovr-id">
            <label>Tarikh:</label><input type="date" id="ovr-date">
            <label>Status:</label>
            <select id="ovr-status">
                <option value="Hadir">Hadir</option>
                <option value="Lewat">Lewat</option>
                <option value="Tak Hadir">Padam Rekod</option>
            </select>
            <div style="margin-top: 15px; text-align:right;">
                <button class="btn" onclick="document.getElementById('modal-override').classList.add('hidden')">Batal</button>
                <button class="btn btn-warning" onclick="simpanOverride()">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATABASE ---
        let db = {
            host: { email: 'hostsemsira@gmail.com', pass: 'Semsira1969' },
            gurus: [{ id: 1, name: 'Ahmad Albab', phone: '0123456789', email: 'ahmad@semsira.edu.my', pass: '123' }],
            kelas: [{ id: 1, name: '5 Sains 1', guruId: 1 }, { id: 2, name: '4 Sains 1', guruId: 1 }],
            murid: [
                { id: 1, nama: 'Ali bin Abu', ic: '080101015563', uid: 'A1B2C3D4', kelasId: 1, sejarahKelas: [{tahun: '2024', kelasId: 2}, {tahun: '2025', kelasId: 1}], kehadiran: [{tarikh:'2025-05-15', status:'Hadir', masa:'07:15:00'}] },
                { id: 2, nama: 'Siti Aminah', ic: '080202026654', uid: 'E5F6G7H8', kelasId: 1, sejarahKelas: [{tahun: '2025', kelasId: 1}], kehadiran: [{tarikh:'2025-05-15', status:'Lewat', masa:'07:45:00'}] }
            ],
            hariOperasi: 190,
            tetapanWaktu: { buka: '06:30', lewat: '07:30', tutup: '14:00' }
        };

        let charts = { hostOverall: null, hostStudent: null };

        // --- UTILS ---
        const getLocalSystemDate = () => new Date().toISOString().split('T')[0];

        function showPage(pageId) {
            document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            document.getElementById('navbar').classList.toggle('hidden', pageId.includes('login') || pageId === 'page-landing');
        }

        function setupHostNav() {
            document.getElementById('nav-menus').innerHTML = `
                <button onclick="switchMenu('statistik', 'host')">Statistik</button>
                <button onclick="switchMenu('sejarah', 'host')">Sejarah</button>
                <button onclick="logout()" style="color:var(--danger);">Keluar</button>`;
        }

        // --- CORE FUNCTIONS ---
        function login(role) {
            if(role === 'host') {
                const email = document.getElementById('login-host-email').value;
                const pass = document.getElementById('login-host-pass').value;
                if(email === db.host.email && pass === db.host.pass) {
                    setupHostNav();
                    showPage('page-dashboard-host');
                    switchMenu('statistik', 'host');
                } else { alert("Salah!"); }
            }
        }

        function logout() { showPage('page-landing'); }

        function switchMenu(menuId, role) {
            document.querySelectorAll(`.${role}-menu`).forEach(el => el.classList.add('hidden'));
            document.getElementById(`menu-${role}-${menuId}`).classList.remove('hidden');
            if(menuId === 'statistik') { 
                document.getElementById('host-overall-date').value = getLocalSystemDate();
                renderHostStatistik(); 
            }
            if(menuId === 'sejarah') renderDropdownSejarah('host');
        }

        // --- STATISTICS & CHARTS ---
        function renderHostStatistik() {
            const date = document.getElementById('host-overall-date').value;
            let h=0, l=0, th=0;
            db.murid.forEach(m => {
                const r = m.kehadiran.find(x => x.tarikh === date);
                if(r) { (r.status === 'Lewat') ? l++ : h++; } else { th++; }
            });
            document.getElementById('stat-h').innerText = h;
            document.getElementById('stat-l').innerText = l;
            document.getElementById('stat-th').innerText = th;

            if(charts.hostOverall) charts.hostOverall.destroy();
            charts.hostOverall = new Chart(document.getElementById('hostOverallChart'), {
                type: 'bar',
                data: { labels: ['Hadir', 'Lewat', 'Tak Hadir'], datasets: [{ data:[h,l,th], backgroundColor:['#22c55e','#f59e0b','#ef4444'] }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        // --- SEJARAH LOGIC ---
        function renderDropdownSejarah(role) {
            const elTahun = document.getElementById(`${role}-sej-tahun`);
            const elKelas = document.getElementById(`${role}-sej-kelas`);
            let tahunSet = new Set(['2025']);
            db.murid.forEach(m => m.sejarahKelas?.forEach(sk => tahunSet.add(sk.tahun)));
            elTahun.innerHTML = Array.from(tahunSet).map(t => `<option value="${t}">${t}</option>`).join('');
            elKelas.innerHTML = '<option value="">-- Pilih Kelas --</option>' + db.kelas.map(k => `<option value="${k.id}">${k.name}</option>`).join('');
        }

        function paparSejarah(role) {
            const tahun = document.getElementById(`${role}-sej-tahun`).value;
            const kelasId = parseInt(document.getElementById(`${role}-sej-kelas`).value);
            const tarikhSpesifik = document.getElementById(`${role}-sej-tarikh`).value;
            const tbody = document.querySelector(`#${role}-sej-table tbody`);
            tbody.innerHTML = '';

            if(!kelasId) return;

            db.murid.filter(m => m.sejarahKelas?.some(sk => sk.tahun === tahun && sk.kelasId === kelasId)).forEach(m => {
                let h=0, l=0;
                m.kehadiran.forEach(r => { if(r.tarikh.startsWith(tahun)) (r.status==='Lewat'?l++:h++); });
                let th = Math.max(0, db.hariOperasi - (h+l));
                
                tbody.innerHTML += `<tr>
                    <td><span class="clickable-text" onclick="paparPelajarDetail(${m.id}, 'page-dashboard-host')">${m.nama}</span></td>
                    <td>${m.ic}</td>
                    <td style="color:var(--success)">${h} Hari</td>
                    <td style="color:var(--warning)">${l} Hari</td>
                    <td style="color:var(--danger)">${th} Hari</td>
                </tr>`;
            });
        }

        function paparPelajarDetail(mId, returnPage) {
            const m = db.murid.find(x => x.id === mId);
            const k = db.kelas.find(x => x.id === m.kelasId);
            document.getElementById('indv-nama').innerText = m.nama;
            document.getElementById('indv-ic').innerText = m.ic;
            document.getElementById('indv-kelas').innerText = k?.name || '-';
            document.getElementById('btn-kembali-murid').onclick = () => showPage(returnPage);
            document.getElementById('btn-edit-kehadiran-detail').onclick = () => bukaOverride(mId);

            const rekod = [...m.kehadiran].sort((a,b) => b.tarikh.localeCompare(a.tarikh));
            document.querySelector('#indv-table tbody').innerHTML = rekod.map(r => `
                <tr><td>${r.tarikh}</td><td style="color:${r.status==='Lewat'?'var(--warning)':'var(--success)'}">${r.status}</td><td>${r.masa}</td></tr>
            `).join('');
            
            showPage('page-host-student-detail');
        }

        function bukaOverride(mId) {
            const m = db.murid.find(x => x.id === mId);
            document.getElementById('ovr-nama').innerText = m.nama;
            document.getElementById('ovr-id').value = mId;
            document.getElementById('ovr-date').value = getLocalSystemDate();
            document.getElementById('modal-override').classList.remove('hidden');
        }

        function simpanOverride() {
            const id = parseInt(document.getElementById('ovr-id').value);
            const tarikh = document.getElementById('ovr-date').value;
            const stat = document.getElementById('ovr-status').value;
            const m = db.murid.find(x => x.id === id);
            const idx = m.kehadiran.findIndex(r => r.tarikh === tarikh);
            
            if(stat === 'Tak Hadir') { if(idx > -1) m.kehadiran.splice(idx,1); }
            else { 
                if(idx > -1) m.kehadiran[idx].status = stat; 
                else m.kehadiran.push({tarikh: tarikh, status: stat, masa: '07:30:00'});
            }
            alert('Berjaya!');
            document.getElementById('modal-override').classList.add('hidden');
            paparPelajarDetail(id, 'page-dashboard-host');
        }
    </script>
</body>
</html>
