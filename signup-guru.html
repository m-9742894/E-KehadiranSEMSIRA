<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Daftar Guru</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" style="max-width:400px;">
    <a href="index.html">
        <button class="btn">Kembali</button>
    </a>

    <div class="card">
        <h2>Daftar Guru Baru</h2>
        <input type="text" id="reg-name" placeholder="Nama Penuh">
        <input type="text" id="reg-phone" placeholder="No Telefon">
        <input type="email" id="reg-email" placeholder="E-mel">
        <input type="password" id="reg-pass" placeholder="Kata Laluan">
        <button class="btn" onclick="registerGuru()">Daftar</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
