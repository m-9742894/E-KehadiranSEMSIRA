<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Login Host</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" style="max-width:400px;">
    <a href="index.html">
        <button class="btn">Kembali</button>
    </a>

    <div class="card">
        <h2>Log Masuk Host</h2>

        <input type="email" id="login-host-email" 
               placeholder="E-mel Host">

        <input type="password" id="login-host-pass" 
               placeholder="Kata Laluan">

        <button class="btn btn-danger" onclick="loginHost()">Masuk</button>
    </div>
</div>

<script>
function loginHost() {
    const email = document.getElementById("login-host-email").value;
    const pass = document.getElementById("login-host-pass").value;

    if(email === "hostsemsira@gmail.com" && pass === "Semsira1969") {
        // simpan session
        localStorage.setItem("hostLogin", "true");

        // redirect
        window.location.href = "dashboard-host.html";
    } else {
        alert("E-mel atau kata laluan salah!");
    }
}
</script>

</body>
</html>
